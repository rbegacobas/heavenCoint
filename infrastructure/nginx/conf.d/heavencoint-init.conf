# ─── Temporary HTTP-only config for initial SSL certificate ───
# Used only on first deploy before SSL cert exists.
# Once cert is obtained, this file is removed and heavencoint.conf takes over.
server {
    listen 80;
    server_name heavencoint.rbegacobas.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Heaven Coint — SSL setup in progress';
        add_header Content-Type text/plain;
    }
}
